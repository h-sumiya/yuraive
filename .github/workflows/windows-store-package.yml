name: Windows Store package

on:
  push:
    tags:
      - 'windows-v*'

permissions:
  contents: read

concurrency:
  group: windows-store-${{ github.ref }}
  cancel-in-progress: false

env:
  APP_PROJECT: player-windows/src/Yuraive.App/Yuraive.App.csproj
  PACKAGE_MANIFEST: player-windows/src/Yuraive.App/Package.appxmanifest
  PACKAGE_OUTPUT: artifacts/windows

jobs:
  package:
    name: Build Microsoft Store package
    runs-on: windows-2025-vs2026
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v3
        with:
          msbuild-architecture: x64

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: editor/package-lock.json

      - name: Cache Rust build outputs
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            runtime/target
          key: windows-rust-${{ hashFiles('runtime/Cargo.lock') }}

      - name: Set package version from tag
        id: version
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if ($env:RELEASE_TAG -notmatch '^windows-v(?<version>(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*))$') {
            throw "The tag must use the form windows-v<major>.<minor>.<patch>."
          }

          $versionParts = $Matches.version.Split('.') | ForEach-Object { [uint32]$_ }
          if ($versionParts.Where({ $_ -gt 65535 }).Count -gt 0) {
            throw "Each package version component must be between 0 and 65535."
          }

          $packageVersion = "$($Matches.version).0"
          $manifestPath = (Resolve-Path $env:PACKAGE_MANIFEST).Path
          $manifest = [xml](Get-Content -LiteralPath $manifestPath)
          $manifest.Package.Identity.Version = $packageVersion
          $manifest.Save($manifestPath)

          "release_version=$($Matches.version)" >> $env:GITHUB_OUTPUT
          "package_version=$packageVersion" >> $env:GITHUB_OUTPUT
          Write-Host "Building Yuraive $packageVersion from $env:RELEASE_TAG"

      - name: Build Store upload package
        shell: pwsh
        run: |
          msbuild $env:APP_PROJECT `
            /restore `
            /target:Publish `
            /property:Configuration=Release `
            /property:Platform=x64 `
            /property:RuntimeIdentifier=win-x64 `
            /property:GenerateAppxPackageOnBuild=true `
            /property:UapAppxPackageBuildMode=StoreOnly `
            /property:AppxBundle=Never `
            /property:AppxPackageSigningEnabled=false `
            /property:AppxPackageDir="$env:GITHUB_WORKSPACE\$env:PACKAGE_OUTPUT\"

      - name: Verify Store upload package
        shell: pwsh
        run: |
          $packages = @(Get-ChildItem $env:PACKAGE_OUTPUT -Recurse -File -Filter '*.msixupload')
          if ($packages.Count -ne 1) {
            throw "Expected exactly one .msixupload package, found $($packages.Count)."
          }

          Write-Host "Created $($packages[0].FullName)"

      - name: Upload Store package
        uses: actions/upload-artifact@v4
        with:
          name: Yuraive-windows-${{ steps.version.outputs.release_version }}
          path: ${{ env.PACKAGE_OUTPUT }}/**/*.msixupload
          if-no-files-found: error
          retention-days: 30
