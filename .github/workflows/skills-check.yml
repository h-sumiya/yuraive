name: Skill bundles

on:
  pull_request:
    paths:
      - 'ai/**'
      - 'docs/**'
      - 'design/**'
      - 'LICENSE'
      - '.github/workflows/skills-*.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: skill-bundles-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build docs and validate AI bundles
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install documentation dependencies
        working-directory: docs
        run: npm ci

      - name: Build documentation
        working-directory: docs
        run: npm run build

      - name: Test content tools
        run: python -m unittest discover -s ai/tests -p 'test_*.py'

      - name: Test bundle scripts
        run: node --test ai/scripts/bundle-lib.test.mjs

      - name: Build AI bundles
        run: node ai/scripts/bundle.mjs all

      - name: Validate AI bundles
        run: |
          node ai/scripts/validate-bundle.mjs skill
          node ai/scripts/validate-bundle.mjs custom-gpt
