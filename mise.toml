[tasks.editorDev]
dir = "editor"
run = "npm run dev"

[tasks.playerBuild]
dir = "player-android"
run = "gradle assembleDebug"

[tasks.playerReleaseBuild]
description = "Build the optimized Android release APK"
dir = "player-android"
run = "gradle assembleRelease"

[tasks.playerTest]
dir = "player-android"
run = "gradle testDebugUnitTest"

[tasks.validatorTest]
dir = "runtime"
run = "cargo test --locked"

[tasks.windowsBuild]
description = "Build the WinUI 3 desktop player and native runtime (x64)"
run = "dotnet build player-windows/Yuraive.Windows.slnx"

[tasks.windowsTest]
description = "Run the Windows player core/native integration tests"
run = "dotnet test player-windows/tests/Yuraive.Core.Tests/Yuraive.Core.Tests.csproj -p:Platform=x64"

[tasks.windowsRun]
description = "Run the WinUI 3 desktop player (x64)"
run = "dotnet run --project player-windows/src/Yuraive.App/Yuraive.App.csproj -p:Platform=x64 -p:BaseOutputPath=bin/windows-run/"

[tools]
node = "latest"
gradle = "8.11.1"
rust = "stable"
