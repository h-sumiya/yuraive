[tasks.editorDev]
dir = "editor"
run = "npm run dev"

[tools]
node = "latest"
gradle = "8.11.1"
rust = "stable"

[tasks.playerBuild]
dir = "player-android"
run = "gradle assembleDebug"

[tasks.playerReleaseBuild]
description = "Build the optimized Android release APK"
dir = "player-android"
run = "gradle assembleRelease"

[tasks.playerTest]
dir = "player-android"
run = "gradle testDebugUnitTest"

[tasks.validatorTest]
dir = "runtime"
run = "cargo test --locked"
